stages:
  - pre
  - build
  - lint
  - test
  - report
  - docs

workflow:
   name: $PIPELINE_WORKFLOW_NAME

build-ci-env:
  stage: build
  needs: []
  tags:
  - docker
  extends:
    - .earth2studio:build-env:base
    - .build-env:cache
  script:
    - make setup-ci

format:
  stage: lint
  needs:
    - job: build-ci-env
      artifacts: false
  tags:
  - docker
  extends:
    - .earth2studio:test:base
    - .lint:cache
  script:
    - ls
    - make format

lint:
  stage: lint
  needs:
    - job: build-ci-env
      artifacts: false
  tags:
  - docker
  extends:
    - .earth2studio:test:base
    - .lint:cache
  script:
    - make interrogate
    - make lint
    - make license

.test:base:
  stage: test
  needs:
    - job: format
      artifacts: false
    - job: lint
      artifacts: false
  tags:
  - docker
  extends:
    - .earth2studio:test:base
  retry:
    max: 2
    exit_codes: 123
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $PIPELINE_REPO_SOURCE != "github"'
      variables:
        TESTMON_CACHE_POLICY: pull-push
        EARTH2STUDIO_CACHE_POLICY: pull-push
        UV_CACHE_POLICY: pull-push
    - if: $PIPELINE_REPO_SOURCE != "github"
      variables:
        EARTH2STUDIO_CACHE_POLICY: pull-push
        UV_CACHE_POLICY: pull-push
    - when: on_success
  script:
    - uv run python test/_ci/check_gpu.py || exit $?
    - uvx tox -c tox-min.ini run -e ${TOX_ENV}

# Template for change-based rules (paths must be specified per job)
.test:rule:main-with-changes: &test_rule_main_with_changes
  if: '$CI_COMMIT_BRANCH == "main" && $PIPELINE_REPO_SOURCE != "github"'
  changes:
    paths: []  # Override paths in each job
    compare_to: 'refs/heads/main'
  variables:
    TESTMON_CACHE_POLICY: pull-push
    EARTH2STUDIO_CACHE_POLICY: pull-push
    UV_CACHE_POLICY: pull-push

.test:rule:non-github-with-changes: &test_rule_non_github_with_changes
  if: $PIPELINE_REPO_SOURCE != "github"
  changes:
    paths: []  # Override paths in each job
    compare_to: 'refs/heads/main'
  variables:
    EARTH2STUDIO_CACHE_POLICY: pull-push
    UV_CACHE_POLICY: pull-push

.test:rule:changes-only: &test_rule_changes_only
  changes:
    paths: []  # Override paths in each job
    compare_to: 'refs/heads/main'
  when: on_success

.test:rule:never: &test_rule_never
  when: never

test:
  extends:
    - .test:base
  variables:
    TOX_ENV: test

test-data:
  extends:
    - .test:base
  variables:
    TOX_ENV: test-data
  rules:
    - <<: *test_rule_main_with_changes
      changes:
        paths:
          - earth2studio/data/**/*
          - earth2studio/lexicon/**/*
          - test/data/**/*
          - test/lexicon/**/*
    - <<: *test_rule_non_github_with_changes
      changes:
        paths:
          - earth2studio/data/**/*
          - earth2studio/lexicon/**/*
          - test/data/**/*
          - test/lexicon/**/*
    - <<: *test_rule_changes_only
      changes:
        paths:
          - earth2studio/data/**/*
          - earth2studio/lexicon/**/*
          - test/data/**/*
          - test/lexicon/**/*
    - <<: *test_rule_never

test-perturb:
  extends:
    - .test:base
  variables:
    TOX_ENV: test-perturb
  rules:
    - <<: *test_rule_main_with_changes
      changes:
        paths:
          - earth2studio/perturbation/**/*
          - test/perturbation/**/*
    - <<: *test_rule_non_github_with_changes
      changes:
        paths:
          - earth2studio/perturbation/**/*
          - test/perturbation/**/*
    - <<: *test_rule_changes_only
      changes:
        paths:
          - earth2studio/perturbation/**/*
          - test/perturbation/**/*
    - <<: *test_rule_never

test-stats:
  extends:
    - .test:base
  variables:
    TOX_ENV: test-stats
  rules:
    - <<: *test_rule_main_with_changes
      changes:
        paths:
          - earth2studio/statistics/**/*
          - test/statistics/**/*
    - <<: *test_rule_non_github_with_changes
      changes:
        paths:
          - earth2studio/statistics/**/*
          - test/statistics/**/*
    - <<: *test_rule_changes_only
      changes:
        paths:
          - earth2studio/statistics/**/*
          - test/statistics/**/*
    - <<: *test_rule_never

test-px-models:
  extends:
    - .test:base
  variables:
    TOX_ENV: test-px-models
  rules:
    - <<: *test_rule_main_with_changes
      changes:
        paths:
          - earth2studio/models/px/**/*
          - test/models/px/**/*
    - <<: *test_rule_non_github_with_changes
      changes:
        paths:
          - earth2studio/models/px/**/*
          - test/models/px/**/*
    - <<: *test_rule_changes_only
      changes:
        paths:
          - earth2studio/models/px/**/*
          - test/models/px/**/*
    - <<: *test_rule_never

test-dx-models:
  extends:
    - .test:base
  variables:
    TOX_ENV: test-dx-models
  rules:
    - <<: *test_rule_main_with_changes
      changes:
        paths:
          - earth2studio/models/dx/**/*
          - test/models/dx/**/*
    - <<: *test_rule_non_github_with_changes
      changes:
        paths:
          - earth2studio/models/dx/**/*
          - test/models/dx/**/*
    - <<: *test_rule_changes_only
      changes:
        paths:
          - earth2studio/models/dx/**/*
          - test/models/dx/**/*
    - <<: *test_rule_never

test-serve:
  extends:
    - .test:base
  variables:
    TOX_ENV: test-serve
  rules:
    - <<: *test_rule_main_with_changes
      changes:
        paths:
          - earth2studio/serve/**/*
          - test/serve/**/*
          - serve/**/*
    - <<: *test_rule_non_github_with_changes
      changes:
        paths:
          - earth2studio/serve/**/*
          - test/serve/**/*
          - serve/**/*
    - <<: *test_rule_changes_only
      changes:
        paths:
          - earth2studio/serve/**/*
          - test/serve/**/*
          - serve/**/*
    - <<: *test_rule_never

coverage:
  stage: report
  allow_failure: true
  needs:
    - job: test
      artifacts: true
      optional: false
    - job: test-data
      artifacts: true
      optional: true
    - job: test-perturb
      artifacts: true
      optional: true
    - job: test-stats
      artifacts: true
      optional: true
    - job: test-px-models
      artifacts: true
      optional: true
    - job: test-dx-models
      artifacts: true
      optional: true
    - job: test-serve
      artifacts: true
      optional: true
  tags:
  - docker
  extends:
    - .earth2studio:test:base
    - .coverage:cache
  script:
    - ls -a
    - make setup-ci
    - make coverage 2>&1 | tee ../blossom.log

include:

  - project: 'modulus/modulus-ci'
    ref: main
    file: '.gitlab-ci/earth2studio/common.gitlab-ci.yml'
