[project]
name = "earth2studio.recipe.tc_hunt"
version = "0.1.0"
description = "global ensemble prediction with tropical cyclone tracking"
readme = "README.md"
requires-python = ">=3.12"
authors = [
  { name = "NVIDIA Earth-2 Team" },
]
dependencies = [
    "earth2studio[data,aifsens,fcn3]>=0.11.0",
    "huggingface-hub",
    "hydra-core>=1.3.2",
    "importlib-metadata>=8.7.0",
    "more-itertools>=10.7.0",
    "omegaconf>=2.3.0",
    "ruamel-yaml>=0.18.14",
    "scipy>=1.16.0",
    "setuptools>=80.9.0",
    "tqdm>=4.67.1",
    "zarrdump>=0.6.0",
]

[project.optional-dependencies]
plot = [
    "cartopy>=0.24.1",
    "ipykernel>=6.30.1",
    "matplotlib>=3.10.3",
    "moviepy>=2.2.1",
]
dev = [
    "ninja>=1.13.0",
    "pre-commit>=4.5.0",
    "pytest>=8.1.0",
]
all = [
    "earth2studio.recipe.tc_hunt[plot]",
    "earth2studio.recipe.tc_hunt[dev]",
]

[project.urls]
Homepage = "https://github.com/NVIDIA/earth2studio/recipes/tc_tracking"
Documentation = "https://github.com/NVIDIA/earth2studio/recipes/tc_tracking/README.md"
Issues = "https://github.com/NVIDIA/earth2studio/issues"
Changelog = "https://github.com/NVIDIA/earth2studio/blob/main/CHANGELOG.md"

# ==== UV configuration ====
[tool.uv.sources]
torch-harmonics = { git = "https://github.com/NVIDIA/torch-harmonics.git" }
earth2studio = { git = "https://github.com/NVIDIA/earth2studio.git" }

[tool.uv]
no-build-isolation-package = ["torch-harmonics"]

[tool.hatch.build.targets.sdist]
include = ["src/**/*.py"]
exclude = []
