[project]
name = "earth2studio.recipe.eval"
version = "0.1.0"
description = "Model Evaluation Recipe — distributed inference, scoring, and validation"
readme = "README.md"
requires-python = ">=3.11,<3.14"
authors = [
  { name="NVIDIA Earth-2 Team" },
]
dependencies = [
    "earth2studio[data,dlwp,perturbation,statistics,utils]",
    "hydra-core>=1.3.0",
    "omegaconf",
    "nvidia-physicsnemo>=2.0",
    "zarr>=3.0.0",
    "matplotlib",
]

[project.optional-dependencies]
dev = [
    "pytest>=6.0.0",
    "pytest-cov",
    "pytest-timeout>=2.0.1",
    "pytest-skip-slow>=0.0.5",
    "pytest-testmon>=2.1.3",
    "pytest-asyncio>=0.26.0",
]

[project.urls]
Homepage = "https://github.com/NVIDIA/earth2studio/recipes/eval"
Documentation = "https://github.com/NVIDIA/earth2studio/recipes/eval/README.md"
Issues = "https://github.com/NVIDIA/earth2studio/issues"

# ==== UV configuration ====
[tool.uv]
override-dependencies = ["onnx; python_full_version < '3.13'"]

[tool.uv.sources]
earth2studio = { path = "../../", editable = true }

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["test"]

[tool.hatch.build.targets.sdist]
include = ["src/**/*.py"]
exclude = []
