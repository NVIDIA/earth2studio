# ============================================================================
# Eval Recipe — default configuration
# ============================================================================
# General-purpose model evaluation: run a prognostic (and optionally
# diagnostic) model across a set of initial conditions, write outputs to zarr.
# ============================================================================

defaults:
    - model: dlwp
    - _self_
    - optional campaign: null   # e.g. campaign=fcn3_2024_full

# ---------------------------------------------------------------------------
# Project metadata
# ---------------------------------------------------------------------------
project: eval_run
run_id: default

# ---------------------------------------------------------------------------
# Initial conditions
# ---------------------------------------------------------------------------
# Option A: explicit list (set to null in campaign configs that use Option B)
start_times:
    - "2024-01-01 00:00:00"

# Option B: sweep (set start_times to null first)
# ic_block_start: "2024-01-01 00:00:00"
# ic_block_end: "2024-01-31 00:00:00"
# ic_block_step: 24   # hours between ICs

# ---------------------------------------------------------------------------
# Pipeline
# ---------------------------------------------------------------------------
# Fully qualified class path, or a {_target_: ...} block.  Built-in options:
#   src.pipelines.forecast.ForecastPipeline     — prognostic rollout (default)
#   src.pipelines.forecast.DiagnosticPipeline   — diagnostic-only (e.g. CorrDiff)
#   src.pipelines.dlesym.DLESyMPipeline         — coupled Earth-system forecast
#   src.pipelines.stormscope.StormScopePipeline — coupled GOES/MRMS nowcasting
# Custom pipelines: point at your own subclass of src.pipelines.Pipeline.
pipeline: src.pipelines.forecast.ForecastPipeline

# ---------------------------------------------------------------------------
# Pre-download enforcement
# ---------------------------------------------------------------------------
# When true, main.py refuses to start unless predownload.py has been run for
# this project/run_id (verified via a sentinel file in the output directory).
# Override with require_predownload=false to skip the check.
require_predownload: true

# ---------------------------------------------------------------------------
# Forecast settings
# ---------------------------------------------------------------------------
nsteps: 20             # number of model steps per forecast
ensemble_size: 1       # 1 = deterministic; >1 = ensemble with perturbation
random_seed: 42        # base seed for reproducible perturbations

# ---------------------------------------------------------------------------
# Resume / multi-job support
# ---------------------------------------------------------------------------
# When true, skip work items that already have completion markers and append
# to the existing zarr store.  Useful for resuming after a failure or
# splitting work across multiple SLURM submissions with the same config.
resume: false

# ---------------------------------------------------------------------------
# Perturbation (only used when ensemble_size > 1)
# ---------------------------------------------------------------------------
# perturbation:
#     _target_: earth2studio.perturbation.CorrelatedSphericalGaussian
#     noise_amplitude: 0.05

# ---------------------------------------------------------------------------
# Diagnostic models (applied at each forecast step, optional)
# ---------------------------------------------------------------------------
# diagnostics:
#     precipitation:
#         architecture: earth2studio.models.dx.PrecipitationAFNO

# ---------------------------------------------------------------------------
# Data source — provides initial conditions
# ---------------------------------------------------------------------------
data_source:
    _target_: earth2studio.data.ARCO
    verbose: false

# ---------------------------------------------------------------------------
# Bring-your-own data (optional)
# ---------------------------------------------------------------------------
# Override either side to point at a user-provided DataSource (e.g. a
# pre-ETL'd zarr store) instead of letting predownload.py cache from
# data_source.  When set:
#
#   * ic_source              — main.py reads ICs directly (skips data.zarr)
#   * verification_source    — score.py reads verification directly
#
# Predownload automatically skips whichever side is BYO.  If both are set,
# the predownload sentinel check in main.py is skipped — running
# predownload.py becomes unnecessary.
#
# Example — a thin zarr-backed DataSource written alongside your config:
# ic_source:
#     _target_: my_pkg.my_data.MyZarrSource
#     store_path: /data/my_training_set.zarr
ic_source: null
verification_source: null

# ---------------------------------------------------------------------------
# Output configuration
# ---------------------------------------------------------------------------
output:
    path: outputs/${project}_${run_id}
    variables:
        - t2m
        - z500
    overwrite: true
    thread_writers: 4   # 0 = synchronous writes
    chunks:
        time: 1
        lead_time: 1

# ---------------------------------------------------------------------------
# Pre-download settings (used by predownload.py, consulted by score.py)
# ---------------------------------------------------------------------------
# predownload.py writes zarr stores into <output.path>/:
#   - data.zarr       — IC data (and verification data when using the same
#                        source).  main.py reads IC data from here.
#   - verification.zarr — only created when verification.source is explicitly
#                          set to a different data source.
# Per-timestamp progress markers enable resume after interruption.
#
# `verification.enabled` is the source of truth for whether data.zarr holds
# verification data.  score.py re-reads this block and falls back to
# data.zarr only when `enabled=true` AND `source=null` (the merged path);
# otherwise it raises rather than silently using an IC-only store.
# If you want scoring, set `enabled=true` in your campaign config so it
# applies to both predownload.py and score.py — don't pass it only as a
# one-shot CLI override to predownload.py.
predownload:
    overwrite: false             # if true, recreate stores from scratch
    verification:
        enabled: false
        source: null             # null = merge into data.zarr using data_source
                                 # set explicitly for a separate verification.zarr

# ---------------------------------------------------------------------------
# Scoring — compare predictions against verification data
# ---------------------------------------------------------------------------
# Run with: python score.py [campaign=...]
# Requires inference (main.py) and predownload with verification enabled.
scoring:
    variables: ${output.variables}     # score the same variables as inference
    metrics:
        rmse:
            _target_: earth2studio.statistics.rmse
            reduction_dimensions: [lat, lon]
    lat_weights: true                  # apply cosine latitude weighting
    lead_time_chunk_size: 8            # lead times per chunk (memory control)
    output:
        store_name: scores.zarr
        overwrite: true
        chunks:
            time: 1
    resume: false

# ---------------------------------------------------------------------------
# Report — aggregate scores and produce markdown + figures
# ---------------------------------------------------------------------------
# Run with: python report.py [campaign=...]
# Requires scoring (score.py) to have completed.
report:
    sections:
        - type: header_visualization   # hero plot (skipped if data unavailable)
          variable: z500
          lead_time: "5 days"

        - type: summary_table
          lead_times: ["1 days", "3 days", "5 days", "7 days", "10 days", "14 days"]
          collapsed: false

        - type: lead_time_curves
          collapsed: true

        - type: ic_heatmap
          metrics: [rmse]
          collapsed: true

    figure_format: png
    # projection: robinson        # optional — map projection for visualization
                                   # (requires cartopy; null = flat plot)

    # variable_groups:            # optional — group vars with shared scales
    #     geopotential: [z500, z850]    # variables on the same plot
    #     temperature: [t500, t850]
    #     # unlisted vars (e.g. t2m, msl) each get their own plot

    # time_groups:                # optional — seasonal / custom breakdown
    #     DJF:
    #         - start: "2024-01-01"
    #           end: "2024-02-29"
    #         - start: "2024-12-01"
    #           end: "2024-12-31"
    #     MAM:
    #         - start: "2024-03-01"
    #           end: "2024-05-31"
    #     JJA:
    #         - start: "2024-06-01"
    #           end: "2024-08-31"
    #     SON:
    #         - start: "2024-09-01"
    #           end: "2024-11-30"

# ---------------------------------------------------------------------------
# Hydra runtime config
# ---------------------------------------------------------------------------
hydra:
    run:
        dir: outputs/${project}_${run_id}
