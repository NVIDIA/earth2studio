# @package _global_
# HealDA analysis evaluation — monthly 2024 analyses scored against ERA5.
# One analysis per IC time; no forecast rollout (lead_time axis is a single
# 0 entry, so scoring reads "analysis error at each cycle time").
defaults:
    - override /model: healda

run_id: healda_2024_analysis

pipeline: src.pipelines.assimilation.AssimilationPipeline

# Every month in 2024 (12 analysis times)
start_times:
    - "2024-01-01 00:00:00"
    - "2024-02-01 00:00:00"
    - "2024-03-01 00:00:00"
    - "2024-04-01 00:00:00"
    - "2024-05-01 00:00:00"
    - "2024-06-01 00:00:00"
    - "2024-07-01 00:00:00"
    - "2024-08-01 00:00:00"
    - "2024-09-01 00:00:00"
    - "2024-10-01 00:00:00"
    - "2024-11-01 00:00:00"
    - "2024-12-01 00:00:00"

# No rollout in analysis mode — nsteps is unused by this pipeline.
nsteps: 0
ensemble_size: 1
resume: true

# Verification (ERA5 via ARCO at the analysis times) must be predownloaded
# for scoring; there is no gridded IC store in analysis mode.
predownload:
    verification:
        enabled: true

output:
    overwrite: false
    variables:
        - t2m
        - u10m
        - v10m
        - msl
        - tcwv
        - z500
        - z850
        - t500
        - t850
        - u500
        - u850
        - v500
        - v850
        - q500
        - q850

scoring:
    metrics:
        rmse:
            _target_: earth2studio.statistics.rmse
            reduction_dimensions: [lat, lon]

report:
    title: "HealDA 2024 — Analysis Evaluation"

    sections:
        - type: header_visualization
          variable: z500
          lead_time: "0 days"

        - type: summary_table
          lead_times: ["0 days"]
          collapsed: false

        # Analysis error per cycle time — the natural view for a
        # single-lead product (lead_time curves would be a single point).
        - type: ic_heatmap
          metrics: [rmse]
          variables: [z500, t2m, msl]
          collapsed: true

        - type: visualization
          variables: [z500, t2m, tcwv]
          lead_times: ["0 days"]
          collapsed: true

    projection: robinson

    variable_groups:
        geopotential: [z500, z850]
        temperature: [t500, t850]
        u_wind: [u500, u850]
        v_wind: [v500, v850]
        humidity: [q500, q850]
        10m_wind: [u10m, v10m]
