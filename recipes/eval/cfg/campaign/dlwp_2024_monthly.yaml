# @package _global_
# DLWP monthly 2024 — deterministic 10-day forecasts, all 7 output variables.
defaults:
    - override /model: dlwp

run_id: dlwp_2024_monthly

start_times:
    - "2024-01-01 00:00:00"
    - "2024-02-01 00:00:00"
    - "2024-03-01 00:00:00"
    - "2024-04-01 00:00:00"
    - "2024-05-01 00:00:00"
    - "2024-06-01 00:00:00"
    - "2024-07-01 00:00:00"
    - "2024-08-01 00:00:00"
    - "2024-09-01 00:00:00"
    - "2024-10-01 00:00:00"
    - "2024-11-01 00:00:00"
    - "2024-12-01 00:00:00"

nsteps: 40

output:
    variables:
        - t2m
        - t850
        - z1000
        - z700
        - z500
        - z300
        - tcwv
