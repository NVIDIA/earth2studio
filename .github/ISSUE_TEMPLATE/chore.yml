name: Chore
description: Maintenance task, refactor, cleanup, or other housekeeping work
title: "🧹[CHORE]: "
labels: ["chore", "? - Needs Triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to help keep Earth2Studio clean and maintainable!
        - By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/NVIDIA/earth2studio/blob/main/CONTRIBUTING.md)
        - You also confirm that you have searched the [open issues](https://github.com/NVIDIA/earth2studio/issues) and have found no duplicates for this request

  - type: dropdown
    id: chore_type
    attributes:
      label: What type of chore is this?
      options:
        - Refactor
        - Cleanup
        - Dependency Update
        - CI/CD
        - Testing
        - Other
    validations:
      required: true

  - type: dropdown
    id: criticality
    attributes:
      label: How would you describe the priority of this chore
      options:
        - Critical (blocking other work)
        - Medium
        - Low (nice to have)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Please provide a clear description of the chore.
      description: Describe what needs to be done and why. Include relevant file paths, modules, or areas of the codebase affected.
